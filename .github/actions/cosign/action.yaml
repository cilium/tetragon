name: 'Generate SBOM and Sign with Cosign'
description: 'Generate SBOM, sign container images, and attach SBOM attestations'
inputs:
  image:
    description: 'Container image to sign (format: "quay.io/org/image@digest")'
    required: true
  image_tag:
    description: 'Container image tag for SBOM generation (format: "quay.io/org/image:tag")'
    required: false
  sbom_name:
    description: 'Name for the SBOM artifact and file (e.g., "tetragon_v1.2.3")'
    required: false
  attach_sbom:
    description: 'Attach SBOM'
    required: false
    default: 'true'
  generate_sbom:
    description: 'Generate SBOM'
    required: false
    default: 'true'
  install_cosign:
    description: 'Whether to install cosign (set to false if already installed)'
    required: false
    default: 'true'
  upload_sbom_release_assets:
    description: 'Upload SBOM as a release asset'
    required: false
    default: 'true'
  max_attempts:
    description: 'Maximum number of retry attempts'
    required: false
    default: '5'
  initial_delay:
    description: 'Initial delay in seconds before first retry'
    required: false
    default: '10'
  registry_username:
    description: 'Registry username for cosign authentication'
    required: false
  registry_password:
    description: 'Registry password for cosign authentication'
    required: false
  registry_url:
    description: 'Registry URL for cosign authentication (e.g., quay.io)'
    required: false
    default: 'quay.io'

runs:
  using: 'composite'
  steps:
    - name: Install Cosign
      if: ${{ inputs.install_cosign == 'true' }}
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Generate SBOM
      if: ${{ inputs.generate_sbom == 'true' }}
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      with:
        artifact-name: sbom_${{ inputs.sbom_name }}.spdx.json
        output-file: ./sbom_${{ inputs.sbom_name }}.spdx.json
        image: ${{ inputs.image_tag }}
        upload-release-assets: ${{ inputs.upload_sbom_release_assets }}

    # Login to registry for cosign to authenticate when pushing signatures
    - name: Login to registry for cosign
      if: ${{ inputs.registry_username != '' && inputs.registry_password != '' }}
      shell: bash
      env:
        REGISTRY_USERNAME: ${{ inputs.registry_username }}
        REGISTRY_PASSWORD: ${{ inputs.registry_password }}
        REGISTRY_URL: ${{ inputs.registry_url }}
      run: |
        echo "Logging into ${REGISTRY_URL} for cosign..."
        echo "${REGISTRY_PASSWORD}" | cosign login "${REGISTRY_URL}" --username "${REGISTRY_USERNAME}" --password-stdin

    - name: Sign Container Image
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        MAX_ATTEMPTS: ${{ inputs.max_attempts }}
        INITIAL_DELAY: ${{ inputs.initial_delay }}
      run: |
        sign_with_retry() {
          local image="$1"
          local delay="$INITIAL_DELAY"

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Attempt $attempt/$MAX_ATTEMPTS: Signing $image"
            if cosign sign -y "$image"; then
              echo "Successfully signed $image"
              return 0
            fi
            echo "Failed to sign $image (attempt $attempt/$MAX_ATTEMPTS)"
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Waiting ${delay}s before retry..."
              sleep "$delay"
              delay=$((delay * 2))
            fi
          done

          echo "ERROR: Failed to sign $image after $MAX_ATTEMPTS attempts"
          return 1
        }

        sign_with_retry "$IMAGE"

    - name: Attach SBOM Attestation
      if: ${{ inputs.attach_sbom == 'true' }}
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        SBOM_FILE: ./sbom_${{ inputs.sbom_name }}.spdx.json
        MAX_ATTEMPTS: ${{ inputs.max_attempts }}
        INITIAL_DELAY: ${{ inputs.initial_delay }}
      run: |
        attest_with_retry() {
          local predicate="$1"
          local image="$2"
          local delay="$INITIAL_DELAY"

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Attempt $attempt/$MAX_ATTEMPTS: Attesting $image with $predicate"
            if cosign attest -y --predicate "$predicate" --type spdxjson "$image"; then
              echo "Successfully attested $image"
              return 0
            fi
            echo "Failed to attest $image (attempt $attempt/$MAX_ATTEMPTS)"
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Waiting ${delay}s before retry..."
              sleep "$delay"
              delay=$((delay * 2))
            fi
          done

          echo "ERROR: Failed to attest $image after $MAX_ATTEMPTS attempts"
          return 1
        }

        attest_with_retry "$SBOM_FILE" "$IMAGE"
