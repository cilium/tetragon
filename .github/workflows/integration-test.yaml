name: Integration Test
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set Up Job Variables
      id: vars
      run: |
        if [ ${{ github.event.issue.pull_request || github.event.pull_request }} ]; then
          PR_API_JSON=$(curl \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            ${{ github.event.issue.pull_request.url || github.event.pull_request.url }})
          SHA=$(echo "$PR_API_JSON" | jq -r ".head.sha")
        else
          SHA=${{ github.sha }}
        fi
        echo "sha=${SHA}" >> $GITHUB_OUTPUT
        echo "operatorImage=quay.io/cilium/tetragon-operator-ci:${SHA}" >> $GITHUB_OUTPUT

    - name: Install Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        # renovate: datasource=golang-version depName=go
        go-version: '1.26.5'

    - name: Create a Kind cluster
      run: |
        make kind

    - name: Pull Tetragon Images
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      with:
        timeout_minutes: 2
        max_attempts: 30
        retry_wait_seconds: 30
        warning_on_retry: false
        command: |
          set -e
          docker pull ${{ steps.vars.outputs.operatorImage }}

    - name: Run go tests
      run: |
        helm upgrade --install tetragon ./install/kubernetes/tetragon -n kube-system \
          --set tetragonOperator.podInfo.enabled=true \
          --set tetragonOperator.image.override=${{ steps.vars.outputs.operatorImage }}
        kubectl rollout status -n kube-system deployment/tetragon-operator
        go test --tags=integration -v ./operator/... ./pkg/manager/... ./pkg/sensors/exec/procevents/... ./pkg/watcher/crdwatcher/...
