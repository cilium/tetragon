name: tetragon-rthooks test
on:
  pull_request:
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'

jobs:
  prepare:
    name: Build tetragon-rthooks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      agentImage: ${{ steps.vars.outputs.agentImage }}
      operatorImage: ${{ steps.vars.outputs.operatorImage }}
      rthooksImage: ${{ steps.vars.outputs.rthooksImage }}
    concurrency:
      group: ${{ github.ref }}-rthooks-build
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        path: go/src/github.com/cilium/tetragon/

    - name: Install Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        # renovate: datasource=golang-version depName=go
        go-version: '1.26.5'

    - name: Set Up Job Variables
      id: vars
      run: |
        if [ ${{ github.event.issue.pull_request || github.event.pull_request }} ]; then
          PR_API_JSON=$(curl \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            ${{ github.event.issue.pull_request.url || github.event.pull_request.url }})
          SHA=$(echo "$PR_API_JSON" | jq -r ".head.sha")
        else
          SHA=${{ github.sha }}
        fi
        echo "agentImage=quay.io/cilium/tetragon-ci:${SHA}" >> $GITHUB_OUTPUT
        echo "operatorImage=quay.io/cilium/tetragon-operator-ci:${SHA}" >> $GITHUB_OUTPUT
        echo "rthooksImage=quay.io/cilium/tetragon-rthooks-ci:${SHA}" >> $GITHUB_OUTPUT

    - name: Wait Tetragon Images
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      with:
        timeout_minutes: 2
        max_attempts: 30
        retry_wait_seconds: 30
        warning_on_retry: false
        command: |
          set -e
          docker pull ${{ steps.vars.outputs.agentImage }}
          docker pull ${{ steps.vars.outputs.operatorImage }}
          docker pull ${{ steps.vars.outputs.rthooksImage }}
          docker rmi ${{ steps.vars.outputs.agentImage }} ${{ steps.vars.outputs.operatorImage }} ${{ steps.vars.outputs.rthooksImage }}

  test:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
        fail-fast: false
        matrix:
           cri:
            - "containerd"
            - "crio"
    concurrency:
      group: ${{ github.ref }}-rthooks-test-${{ matrix.cri }}
      cancel-in-progress: true
    steps:
    - name: Checkout Code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        path: go/src/github.com/cilium/tetragon/

    - name: Install Go
      uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
      with:
        # renovate: datasource=golang-version depName=go
        go-version: '1.26.5'

    - name: Install kubectl
      uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
      with:
        # renovate: datasource=github-releases depName=kubernetes/kubernetes
        version: v1.36.3

    - name: Install Helm
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      with:
        # renovate: datasource=github-releases depName=helm/helm
        version: v4.2.3

    - name: Install Minikube
      uses: medyagh/setup-minikube@e9e035a86bbc3caea26a450bd4dbf9d0c453682e # v0.0.21
      with:
        start: false

    - name: Pull Tetragon Images
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      with:
        timeout_minutes: 2
        max_attempts: 30
        retry_wait_seconds: 30
        warning_on_retry: false
        command: |
          set -e
          docker pull ${{ needs.prepare.outputs.agentImage }}
          docker pull ${{ needs.prepare.outputs.operatorImage }}
          docker pull ${{ needs.prepare.outputs.rthooksImage }}


    - name: Run e2e Tests
      run: |
        cd go/src/github.com/cilium/tetragon
        make e2e-test-minikube E2E_BUILD_IMAGES=0 \
        MINIKUBE_CONTAINER_RUNTIME=${{ matrix.cri }} \
        E2E_AGENT=${{ needs.prepare.outputs.agentImage }} \
        E2E_OPERATOR=${{ needs.prepare.outputs.operatorImage }} \
        E2E_RTHOOKS=${{ needs.prepare.outputs.rthooksImage }} \
        EXTRA_TESTFLAGS="-args -v=4"


    - name: Upload Tetragon Logs
      if: failure() || cancelled()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: tetragon-logs-${{ matrix.cri }}
        path: /tmp/tetragon.e2e.*
        retention-days: 5
