name: vmtests-policytest

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'

jobs:
  build:
    name: Build
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.ref }}-vmtests-policytests
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: go/src/github.com/cilium/tetragon/

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # renovate: datasource=golang-version depName=go
          go-version: '1.26.4'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libelf-dev netcat-traditional libcap-dev gcc libc6-dev-i386 pahole llvm
          echo `which clang`
          echo `which llc`
          echo `clang --version`

      - name: Build tester progs, vmtests, and tarball
        env:
          GOPATH: /home/runner/work/tetragon/tetragon/go
        run: |
          cd go/src/github.com/cilium/tetragon/
          make -C tests/vmtests
          make tester-progs-tarball
          make tarball

      - name: Getting version tag
        id: tag
        run: echo "tag=$(make version)" >> $GITHUB_OUTPUT
        working-directory: go/src/github.com/cilium/tetragon

      - name: Tar build
        run: |
          cd go/src/github.com/cilium/
          tar cz --exclude='tetragon/.git' -f /tmp/tetragon.tar ./tetragon

      - name: Upload build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tetragon-build
          path: /tmp/tetragon.tar
          retention-days: 5

  test:
    strategy:
      fail-fast: false
      matrix:
        kernel:
          # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
          - 'rhel8.10-20260706.013554'
          # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
          - 'bpf-next-20260706.013554'
          # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
          - '6.18-20260706.013554'
          # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
          - '6.12-20260706.013554'
          # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
          - '6.6-20260706.013554'
          # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
          - '6.1-20260706.013554'
          # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
          - '5.15-20260706.013554'
          # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
          - '5.10-20260706.013554'
          # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
          - '5.4-20260706.013554'
          # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
          - '4.19-20260706.013554'
    concurrency:
      group: ${{ github.ref }}-vmtest-${{ matrix.kernel }}-${{ matrix.group }}
      cancel-in-progress: true
    needs: build
    name: Test kernel ${{ matrix.kernel }} / test group ${{ matrix.group }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Remove slow Azure apt mirrors
        run: |
          # The default 'azure.archive.ubuntu.com' mirrors can be really slow.
          # Removing azure.archive will pioritize the official Ubuntu mirrors.
          if [ -f /etc/apt/apt-mirrors.txt ]; then
            sudo sed -i '/azure.archive.ubuntu.com/d' /etc/apt/apt-mirrors.txt
            echo "Using mirrors:"
            cat /etc/apt/apt-mirrors.txt
          fi

      - name: Install VM test dependencies
        run: |
          sudo apt-get update
          sudo apt-cache search qemu
          sudo apt-get install -y mmdebstrap libguestfs-tools qemu-utils qemu-system-x86 cpu-checker qemu-kvm libvirt-daemon-system libvirt-clients bridge-utils virtinst virt-manager isc-dhcp-client

      - name: Make kernel accessible
        run: |
          sudo chmod go+rX -R /boot/

      - name: Download build data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tetragon-build

      - name: Extract build data
        # NB: currently, due to how tests work, we need to extract to the same path.
        run: |
          mkdir -p go/src/github.com/cilium/
          tar xf tetragon.tar -C go/src/github.com/cilium

      - name: Test kernel ${{ matrix.kernel }}
        if: ${{ !startsWith(matrix.kernel, '4.19') }}
        run: |
          repo_root="$GITHUB_WORKSPACE/go/src/github.com/cilium/tetragon"
          tetragon_tarball="$repo_root/build/amd64/linux-tarball/tetragon-${{ needs.build.outputs.tag }}-amd64.tar.gz"
          cd "$repo_root"
          ./tests/vmtests/fetch-data.sh ${{ matrix.kernel }}
          kimage=$(find tests/vmtests/test-data/kernels -path "*vmlinuz*" -type f)
          echo "Using: kernel:$kimage"
          sudo ./tests/vmtests/tetragon-vmtests-run policytest \
                  --kernel "${kimage}" \
                  --tetragon-tarball "${tetragon_tarball}" \
                  --tester-progs-tarball "$repo_root/tester-progs.tar.gz" \
                  --base tests/vmtests/test-data/images/base.qcow2 \
                  --cpu 4 \
                  --mem 8G

      - name: Test kernel ${{ matrix.kernel }} with btf file
        if: ${{ startsWith(matrix.kernel, '4.19') }}
        run: |
          repo_root="$GITHUB_WORKSPACE/go/src/github.com/cilium/tetragon"
          tetragon_tarball="$repo_root/build/amd64/linux-tarball/tetragon-${{ needs.build.outputs.tag }}-amd64.tar.gz"
          cd "$repo_root"
          ./tests/vmtests/fetch-data.sh ${{ matrix.kernel }}
          kimage=$(find tests/vmtests/test-data/kernels -path "*vmlinuz*" -type f)
          btf=$(find tests/vmtests/test-data/kernels -path "*btf*" -type f)
          echo "Using: kernel:$kimage btf:$btf"
          sudo ./tests/vmtests/tetragon-vmtests-run policytest \
                  --kernel "${kimage}" \
                  --btf-file "${btf}" \
                  --tetragon-tarball "${tetragon_tarball}" \
                  --tester-progs-tarball "$repo_root/tester-progs.tar.gz" \
                  --base tests/vmtests/test-data/images/base.qcow2 \
                  --cpu 4 \
                  --mem 8G

  post-test:
    runs-on: ubuntu-latest
    needs: [test]
    if: success()
    steps:
      # delete the built binaries from the artifacts in case of overall success
      - uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118 # v6.0.0
        with:
          name: tetragon-build
