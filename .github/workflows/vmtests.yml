name: vmtests
on:
  pull_request:
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'

env:
  VMTEST_APT_PACKAGES: >-
    mmdebstrap libguestfs-tools qemu-utils qemu-system-x86 cpu-checker qemu-kvm
    libvirt-daemon-system libvirt-clients bridge-utils virtinst virt-manager
    isc-dhcp-client

jobs:
  build:
    name: Build tetragon
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.ref }}-vmtest-build
      cancel-in-progress: true
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        path: go/src/github.com/cilium/tetragon/

    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        # renovate: datasource=golang-version depName=go
        go-version: '1.26.2'

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libelf-dev netcat-traditional libcap-dev gcc libc6-dev-i386 pahole llvm
        echo `which clang`
        echo `which llc`
        echo `clang --version`
    - name: Build
      env:
        GOPATH: /home/runner/work/tetragon/tetragon/go
      run: |
        cd go/src/github.com/cilium/tetragon/
        make -j3 tetragon-bpf tester-progs test-compile
        make -C tests/vmtests

    - name: Split tests
      run: |
        #  see testfile below
        cd go/src/github.com/cilium/tetragon/
        go run ./tools/split-tetragon-gotests -ci-run 1

    - name: tar build
      run: |
        cd go/src/github.com/cilium/
        tar cz --exclude='tetragon/.git' -f /tmp/tetragon.tar ./tetragon

    - name: upload build
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
         name: tetragon-build
         path: /tmp/tetragon.tar
         retention-days: 5

  prep-vmtest-deps:
    name: Prepare VM test apt packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Download VM test dependency packages
      run: |
        sudo apt-get update
        sudo apt-get install -y --download-only $VMTEST_APT_PACKAGES
        sudo tar czf /tmp/vmtests-apt-cache.tar.gz \
          --exclude='var/cache/apt/archives/lock' \
          --exclude='var/cache/apt/archives/partial' \
          --exclude='var/lib/apt/lists/lock' \
          --exclude='var/lib/apt/lists/partial' \
          -C / \
          var/cache/apt/archives \
          var/lib/apt/lists

    - name: Upload VM test dependency packages
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
         name: vmtests-apt-cache
         path: /tmp/vmtests-apt-cache.tar.gz
         retention-days: 1

  test:
    strategy:
        fail-fast: false
        matrix:
           kernel:
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - 'rhel8.10-20260206.193128'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - 'bpf-next-20260310.122539'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '6.18-20260310.122539'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '6.12-20260310.122539'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '6.6-20260310.122539'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '6.1-20260310.122539'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '5.15-20260310.122539'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '5.10-20260310.122539'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '5.4-20260310.122539'
              # renovate: datasource=docker depName=quay.io/lvh-images/kernel-images
              - '4.19-20260310.122539'
           group:
              - 0
    concurrency:
      group: ${{ github.ref }}-vmtest-${{ matrix.kernel }}-${{ matrix.group }}
      cancel-in-progress: true
    needs: [build, prep-vmtest-deps]
    name: Test kernel ${{ matrix.kernel }} / test group ${{ matrix.group }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - name: download VM test dependency packages
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
         name: vmtests-apt-cache

    - name: Install VM test dependencies
      run: |
        sudo tar xzf vmtests-apt-cache.tar.gz -C /
        sudo apt-get install -y --no-download $VMTEST_APT_PACKAGES

    - name: Make kernel accessible
      run: |
        sudo chmod go+rX -R /boot/

    - name: download build data
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
         name: tetragon-build

    - name: extract build data
      # NB: currently, due to how tests work, we need to extract to the same path.
      run: |
        mkdir -p go/src/github.com/cilium/
        tar xf tetragon.tar -C go/src/github.com/cilium

    - name: test kernel ${{ matrix.kernel }}
      if: ${{ !startsWith(matrix.kernel, '4.19') }}
      run: |
        cd go/src/github.com/cilium/tetragon
        ./tests/vmtests/fetch-data.sh ${{ matrix.kernel }}
        kimage=$(find tests/vmtests/test-data/kernels -path "*vmlinuz*" -type f)
        echo "Using: kernel:$kimage"
        sudo ./tests/vmtests/tetragon-vmtests-run \
                --kernel ${kimage} \
                --kernel-ver  ${{ matrix.kernel }} \
                --base tests/vmtests/test-data/images/base.qcow2 \
                --enable-detailed-results \
                --testsfile ./tests/vmtests/test-group-${{ matrix.group }}

    - name: test kernel ${{ matrix.kernel }} with btf file
      if: ${{ startsWith(matrix.kernel, '4.19') }}
      run: |
        cd go/src/github.com/cilium/tetragon
        ./tests/vmtests/fetch-data.sh ${{ matrix.kernel }}
        kimage=$(find tests/vmtests/test-data/kernels -path "*vmlinuz*" -type f)
        btf=$(find tests/vmtests/test-data/kernels -path "*btf*" -type f)
        echo "Using: kernel:$kimage bptf:$btf"
        sudo ./tests/vmtests/tetragon-vmtests-run \
                --kernel ${kimage} \
                --kernel-ver  ${{ matrix.kernel }} \
                --btf-file ${btf} \
                --base tests/vmtests/test-data/images/base.qcow2 \
                --enable-detailed-results \
                --testsfile ./tests/vmtests/test-group-${{ matrix.group }}

    - name: Chmod test results on failure or cancelation
      if: failure() || cancelled()
      run: |
        sudo chmod -R go+rX go/src/github.com/cilium/tetragon/tests/vmtests/vmtests-results-*

    - name: Upload test results on failure or cancelation
      if: failure() || cancelled()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: tetragon-vmtests-${{ matrix.kernel }}-${{ matrix.group }}-results
        path: go/src/github.com/cilium/tetragon/tests/vmtests/vmtests-results-*
        retention-days: 5

  post-test:
    runs-on: ubuntu-latest
    needs: [test]
    if: success()
    steps:
      # delete the built binaries from the artifacts in case of overall success
      - uses: geekyeggo/delete-artifact@f275313e70c08f6120db482d7a6b98377786765b # v5.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: tetragon-build

      - uses: geekyeggo/delete-artifact@f275313e70c08f6120db482d7a6b98377786765b # v5.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: vmtests-apt-cache
